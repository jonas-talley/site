<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Math Practice</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="math-header">
            <a href="../" class="back-btn">&larr; Home</a>
            <div class="tabs">
                <button id="tab-practice" class="tab-btn active">Question</button>
                <button id="tab-settings" class="tab-btn">Settings</button>
            </div>
        </header>

        <main>
            <section id="practice-view" class="view">
                <div class="stats">
                    <span>Total: <span id="stat-total">0</span></span>
                    <span>Correct: <span id="stat-correct">0</span></span>
                    <span>Percent: <span id="stat-percent">0%</span></span>
                </div>
                
                <div class="question-container">
                    <h1 id="question-text">:</h1>
                    <input type="number" id="answer-input" pattern="[0-9\-]*" inputmode="numeric" placeholder="?">
                    <div class="actions">
                        <button id="check-btn" class="primary-btn">CHECK</button>
                    </div>
                </div>
            </section>

            <section id="settings-view" class="view hidden">
                <div class="settings-group">
                    <h3>Operations</h3>
                    <label class="checkbox-container">
                        <input type="checkbox" id="op-addition" checked>
                        <span class="checkmark"></span> Addition?
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="op-subtraction" checked>
                        <span class="checkmark"></span> Subtraction?
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="op-multiplication" checked>
                        <span class="checkmark"></span> Multiplication?
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="op-negatives" checked>
                        <span class="checkmark"></span> Negatives?
                    </label>
                </div>

                <div class="settings-group">
                    <h3>Range</h3>
                    <div class="select-row">
                        <label for="min-val">Min Value:</label>
                        <select id="min-val">
                            <option value="0">0</option>
                            <option value="5">5</option>
                            <option value="10">10</option>
                        </select>
                    </div>
                    <div class="select-row">
                        <label for="max-val">Max Value:</label>
                        <select id="max-val">
                            <option value="15" selected>15</option>
                            <option value="20">20</option>
                            <option value="25">25</option>
                            <option value="30">30</option>
                            <option value="40">40</option>
                            <option value="50">50</option>
                            <option value="75">75</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
